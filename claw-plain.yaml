apiVersion: claw.sandbox.redhat.com/v1alpha1
kind: Claw
metadata:
  name: claw-plain
spec:
  # Pinned so both demo instances run the identical OpenClaw build.
  # Must match claw-memory exactly (2026.7.1); the ONLY intended differences are
  # spec.memory (absent here) and memorySearch (disabled here).
  image: ghcr.io/openclaw/openclaw:2026.7.1
  idle: false
  # NO spec.memory block. This is the control instance.
  config:
    management: operator
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            # Same non-Codex chat model as claw-memory, so the only variable is
            # the memory stack, not the model.
            primary: anthropic/claude-sonnet-4-6
          # Explicitly disable semantic search. The operator enables it by
          # default from any embedding-capable credential (upstream #177),
          # independently of spec.memory. This is the control instance, so we
          # turn search off to isolate the memory stack's contribution. The
          # operator respects a user-set memorySearch and backs off.
          memorySearch:
            enabled: false
        list:
        - id: default
          name: Claw-Plain
          identity:
            name: Claw-Plain
          workspace: ~/.openclaw/workspace
  credentials:
  # Both credentials present on BOTH instances so model access is identical;
  # only the memory instance uses the OpenAI key (for embeddings), and only
  # because it has search enabled. Create these Secrets (key: api-key) or edit.
  - name: anthropic
    provider: anthropic
    secretRef:
    - key: api-key
      name: anthropic-api-key
  - name: openai
    provider: openai
    secretRef:
    - key: api-key
      name: openai-api-key
