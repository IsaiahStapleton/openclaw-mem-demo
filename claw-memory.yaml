apiVersion: claw.sandbox.redhat.com/v1alpha1
kind: Claw
metadata:
  name: claw-memory
spec:
  # Pinned so both demo instances run the identical OpenClaw build.
  image: ghcr.io/openclaw/openclaw:2026.6.11
  idle: false
  # The entire difference between the two instances is this block.
  memory:
    enabled: true
  config:
    management: operator
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            primary: openai/gpt-5.5
        list:
        - id: default
          name: Claw-Memory
          identity:
            name: Claw-Memory
          workspace: ~/.openclaw/workspace
  credentials:
  # Embedding-capable credential: required for vector recall to activate.
  # Create this Secret in your namespace (key: api-key) or point secretRef
  # at your own.
  - name: openai
    provider: openai
    secretRef:
    - key: api-key
      name: openai-api-key
